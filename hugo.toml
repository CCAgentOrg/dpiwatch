baseURL = 'https://digital-india.cashlessconsumer.in'
languageCode = 'en-us'
title = 'Digital India Archiver'
theme = 'PaperMod'

[params]
  description = 'Weekly Digital Governance Newsletter – tracking Aadhaar, DigiLocker, ONDC, API Setu, and India'
  keywords = ['Digital India', 'DPI', 'Aadhaar', 'eGovernance', 'India Stack', 'UIDAI', 'NPCI', 'ONDC']
  images = ['https://digital-india.cashlessconsumer.in/cover.png']
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  enableEmoji = true

  [params.homeInfoParams]
    Title = "Digital India Archiver"
    Content = "Tracking India's Digital Public Infrastructure (DPI) ecosystem — from Aadhaar to UPI, ONDC to DigiLocker. Automated daily briefs + themed deep dives."

  [[params.profileMode.buttons]]
    name = "📰 Latest Posts"
    url = "posts"
    weight = 10

  [[params.profileMode.buttons]]
    name = "ℹ️ About"
    url = "about"
    weight = 20

  [[params.profileMode.buttons]]
    name = "🤖 Agents"
    url = "agents"
    weight = 30

  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"

  [params.cover]
    hidden = true
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    URL = "https://github.com/CCAgentOrg/digital-india-newsletter/content"
    Text = "✏️ Suggest Changes"
    appendFilePath = true

  [params.author]
    name = "CashlessConsumer"
    email = ""
    link = "https://cashlessconsumer.in"
    bio = "Consumer advocacy & research for India's digital payments ecosystem"

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/CCAgentOrg/digital-india-newsletter'

  [[params.socialIcons]]
    name = 'twitter'
    url = 'https://twitter.com/CashlessConsumer'

  [[params.socialIcons]]
    name = 'rss'
    url = 'index.xml'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '🏠 Home'
    url = '/'
    weight = 10

  [[menu.main]]
    identifier = 'posts'
    name = '📰 Posts'
    url = '/posts/'
    weight = 20

  [[menu.main]]
    identifier = 'agents'
    name = '🤖 Agents'
    url = '/agents/'
    weight = 30

  [[menu.main]]
    identifier = 'about'
    name = 'ℹ️ About'
    url = '/about/'
    weight = 40

  [[menu.main]]
    identifier = 'tags'
    name = '🏷️ Tags'
    url = '/tags/'
    weight = 50

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.twitter]
    disable = false
    enableDNT = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true

[services]
  [services.instagram]
    disableInlineCSS = true
  [services.twitter]
    disableInlineCSS = true

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.highlight]
    style = 'github'
    lineNos = true
    codeFences = true
    guessSyntax = true
