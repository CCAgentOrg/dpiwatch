baseURL = 'https://digital-india.cashlessconsumer.in'
languageCode = 'en-us'
title = 'Digital India Archiver'
theme = 'PaperMod'

[params]
  author = 'CashlessConsumer'
  description = 'Weekly Digital Governance Newsletter – Aadhaar, DPI, data policy, and government tech updates.'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = '📜 Digital India Archiver'
    Content = 'Weekly newsletter tracking digital governance in India. Updates on Aadhaar, Digital Public Infrastructure, data protection policy, government tech initiatives, and digital identity developments.'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/cashlessconsumer'

  [[params.socialIcons]]
    name = 'twitter'
    url = 'https://twitter.com/cashlessconsumer'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '🏠 Home'
    url = '/'
    weight = 10

  [[menu.main]]
    identifier = 'posts'
    name = '📰 Posts'
    url = '/posts/'
    weight = 20

  [[menu.main]]
    identifier = 'tags'
    name = '🏷️ Tags'
    url = '/tags/'
    weight = 30

  [[menu.main]]
    identifier = 'rss'
    name = '📡 RSS'
    url = '/index.xml'
    weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.highlight]
    style = 'github'
    lineNos = true
    codeFences = true
    guessSyntax = true
